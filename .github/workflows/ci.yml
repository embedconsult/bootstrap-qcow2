name: Crystal CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Crystal 1.18.2
        uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.18.2

      - name: Install shards
        run: shards install --skip-postinstall

      - name: Build binary
        run: shards build

      - name: Check formatting
        run: crystal tool format --check

      - name: Run specs
        run: LOG_LEVEL=DEBUG crystal spec -v

      - name: Build sysroot workspace and plan
        run: |
          ./bin/bq2 --install
          ./bin/sysroot-builder --arch x86_64
          test -f data/sysroot/seed-rootfs/bq2-rootfs/var/lib/sysroot-build-plan.json
          tar -czf /tmp/sysroot-workspace.tar.gz -C data/sysroot seed-rootfs/bq2-rootfs

      - name: Upload sysroot workspace artifact
        uses: actions/upload-artifact@v4
        with:
          name: sysroot-workspace
          path: /tmp/sysroot-workspace.tar.gz
